<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galactica Launcher</title>
  <style>
    /* Reset & base */
    * { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0; background: #121212; color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; user-select: none; position: relative;
    }
    body { display: flex; height: 100vh; position: relative; }

    /* Top/Bottom UI */
    #topTitle {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      font-size: 1.8rem; font-weight: 700; color: #5c6ac4; padding: 12px 0;
      z-index: 250; text-shadow: 1px 1px 3px #222; pointer-events: none;
    }
    #bottomFooter {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      font-size: 1rem; color: #888; padding: 10px 0; z-index: 250;
      font-style: italic; pointer-events: none;
    }
    
    /* Sidebar Toggles */
    #toggleLeft, #toggleRightUtilities {
      position: fixed; top: 15px; width: 150px; height: 40px;
      background: #5c6ac4; border: none; border-radius: 20px;
      color: white; cursor: pointer; font-weight: 600; z-index: 200;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background-color 0.3s ease;
    }
    #toggleLeft { left: 15px; }
    #toggleRightUtilities { right: 15px; }
    #toggleLeft:hover, #toggleRightUtilities:hover { background-color: #7e8bf7; }

    /* Sidebars */
    #menuLeft, #menuRightUtilities {
      position: fixed; top: 0; height: 100vh; background: #1e1e1e;
      padding: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; z-index: 150;
      transition: transform 0.3s ease; overflow-y: auto;
    }
    #menuLeft { width: 260px; left: 0; transform: translateX(-260px); }
    #menuRightUtilities { width: 320px; right: 0; transform: translateX(320px); }
    #menuLeft:not(.hidden), #menuRightUtilities:not(.hidden) { transform: translateX(0); }

    .sidebar-header { font-size: 1.25rem; font-weight: 700; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .category-title { font-size: 1rem; color: #5c6ac4; margin: 15px 0 8px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

    /* GIF Options */
    .gifOption {
      cursor: pointer; display: flex; flex-direction: column; align-items: center;
      gap: 8px; color: #bbb; padding: 10px; border-radius: 8px; transition: 0.2s;
    }
    .gifOption img { width: 100%; border-radius: 6px; filter: grayscale(30%); }
    .gifOption:hover { background: #2a2a82; color: #fff; }
    .gifOption.selected { border: 2px solid #5c6ac4; color: #5c6ac4; }
    .gifOption.selected img { filter: none; }

    /* Game Buttons */
    .gameBtn {
      width: 100%; margin-bottom: 8px; background: #333; border: 1px solid #444;
      color: white; padding: 12px; border-radius: 6px; cursor: pointer;
      text-align: left; transition: 0.2s;
    }
    .gameBtn:hover { background: #5c6ac4; border-color: #7e8bf7; transform: translateX(5px); }

    /* Main viewer */
    #viewer {
      flex: 1; display: flex; justify-content: center; align-items: center;
      background: #000; height: 100vh; transition: margin 0.3s ease;
    }
    #mainGif { max-width: 90vw; max-height: 85vh; border-radius: 14px; box-shadow: 0 20px 40px rgba(92, 106, 196, 0.4); }
  </style>
</head>

<script>
  // --- CONFIGURATION: ADD MORE LISTS AND GAMES HERE ---
  const gameCategories = [
    {
      title: "games",
      games: [
        {name: "Minecraft 1.12", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/single-file.html" },
        {name: "Parking Fury", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/parkingfury3.html" },
        {name: "Wheely Bike", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/wheeliebike.html"},
        {name: "Space Waves", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/spacewaves.html"},
        {name: "Ragdoll Archer", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/ragdollarchers.htm"},
        {name: "Wordle Unlimited", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/wordleunlimited.html"},
        {name: "Geometry Dash", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/geometrydash.html"},
        {name: "Karate Bros", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/karatebros.html"},
        {name: "Ping-Pong Chaos", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/pingpongchaos.html" },
        {name: "Basketball Random", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/basketrandom.html"},
        {name: "Elastic Face", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/offline/elasticface.htm"}
      ]
    },
    {
      title: "Utilities",
      games: [
        { name: "Single File", url: "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/refs/heads/master/single-file.html" },
        { name: "soundboard", url: "https://raw.githubusercontent.com/surnamemans/Sound-Board/refs/heads/main/my%20instants%20sound%20board" }
        ]
    }
  ];

  // Sidebar Toggles
  const menuLeft = document.getElementById('menuLeft');
  const menuRight = document.getElementById('menuRightUtilities');
  
  document.getElementById('toggleLeft').onclick = () => menuLeft.classList.toggle('hidden');
  document.getElementById('toggleRightUtilities').onclick = () => menuRight.classList.toggle('hidden');

  // GIF Logic
  const mainGif = document.getElementById('mainGif');
  const gifOptions = document.querySelectorAll('.gifOption');

  gifOptions.forEach(opt => {
    opt.onclick = () => {
      mainGif.src = opt.dataset.src;
      gifOptions.forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
    };
  });

  // GAME LAUNCHER LOGIC
  function openGameInNewTab(url) {
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
        return res.text();
      })
      .then(html => {
        const baseUrl = url.substring(0, url.lastIndexOf("/") + 1);
        // Add base URL so images/scripts inside the game work
        html = html.replace(/<head(\s|>)/i, `<head><base href="${baseUrl}">`);

        const newWin = window.open('about:blank', '_blank');
        if (!newWin) {
          alert("Pop-up blocked! Please allow pop-ups to launch the game.");
          return;
        }
        newWin.document.open();
        newWin.document.write(html);
        newWin.document.close();
      })
      .catch(err => {
        alert("Failed to load game.");
        console.error(err);
      });
  }

  // BUILD THE LISTS
  const wrapper = document.getElementById('launcherWrapper');

  gameCategories.forEach(cat => {
    // Create category title
    const catHeader = document.createElement('div');
    catHeader.classList.add('category-title');
    catHeader.textContent = cat.title;
    wrapper.appendChild(catHeader);

    // Create buttons for this category
    cat.games.forEach(game => {
      const btn = document.createElement('button');
      btn.classList.add('gameBtn');
      btn.textContent = game.name;
      btn.onclick = () => {
        openGameInNewTab(game.url);
        // Clear gif highlights when playing
        gifOptions.forEach(o => o.classList.remove('selected'));
      };
      wrapper.appendChild(btn);
    });
  });
</script>
